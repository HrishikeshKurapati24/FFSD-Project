server {
    listen 80;

    # Root directory where the React build files are located
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This is critical for React SPA routing (e.g., /brand/home)
        # It ensures that all unknown paths are redirected to index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Backend container
    # Note: 'backend' matches the service name in docker-compose.yml
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections for real-time features
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Standard error page handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
